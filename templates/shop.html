<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tenant Shop Finder</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin-top: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007BFF; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2></h2>
    <form action="/shops/" method="post">
        <input type="number" name="shop_id" placeholder="Enter Shop ID (e.g., 1 or 2)" required>
        <button type="submit">Fetch Shop Info</button>
    </form>

    <!-- If shop data exists, Jinja2 will render this block -->
    {% if shop %}
    <div class="card">
        <h3>🏠 {{ shop.name }}</h3>
        <p><strong>Currency:</strong> {{ shop.currency }}</p>
        <p><strong>Timezone:</strong> {{ shop.timezone }}</p>
        <hr>
        <h4>System Instructions / Rules:</h4>
        <p>{{ shop.system_instructions }}</p>
    </div>
    {% elif error %}
    <p style="color: red; margin-top: 20px;">⚠️ {{ error }}</p>
    {% endif %}
</body>
</html>
